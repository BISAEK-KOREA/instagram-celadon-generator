<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>샘플 BSK-20260709-11 — 리나의 편지</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#241318; color:#f3e9ec; font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px 12px; box-sizing:border-box; }
  .pno { font-size:12px; letter-spacing:1px; opacity:.6; }
  h1 { font-size:18px; font-weight:600; margin:2px 0; text-align:center; }
  p.sub { font-size:13px; opacity:.7; margin:0 0 14px; text-align:center; }
  .tabs { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; justify-content:center; }
  .tabs button { border:1px solid rgba(240,169,190,.35); background:transparent; color:#f3e9ec;
    padding:8px 18px; border-radius:999px; font-size:14px; cursor:pointer; }
  .tabs button.active { background:#e08fa8; color:#301018; border-color:#e08fa8; font-weight:600; }
  video { width:100%; max-width:380px; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,.5); background:#000; }
  .info { max-width:380px; font-size:13px; opacity:.9; margin-top:16px; line-height:1.7; }
  .info b { color:#f0a9be; }
  .brand { margin-top:20px; font-size:12px; opacity:.5; }
</style>
</head>
<body>
  <div class="pno">제작번호 · BSK-20260709-11 · Shop@KBridge (스타일 샘플)</div>
  <h1>한국드라마 버전 — 당신이 주인공</h1>
  <p class="sub">K-드라마 감성 · 잔잔한 피아노 · 비공개 미리보기</p>

  <div class="tabs">
    <button id="btn-ar" class="active" onclick="pick('ar')">🇸🇦 아랍어</button>
    <button id="btn-ko" onclick="pick('ko')">🇰🇷 한국어</button>
    <button id="btn-en" onclick="pick('en')">🇬🇧 English</button>
  </div>

  <video id="player" controls playsinline preload="metadata" poster="kbridge_drama_cover.png">
    <source id="src" src="kbridge_drama_reel_ar.mp4" type="video/mp4">
  </video>

  <div class="info"><b>스타일:</b> 한국드라마 — 비 오는 창, 네온 골목, 손편지, 우산, 따뜻한 창가. 감성 피아노<br><b>흐름:</b> 모든 드라마엔… → 빗속의 우연이 아닌 → 메시지 하나로 → 빗속이라도 → 주인공은 당신<br><b>음악:</b> Melancholy Piano (CC0)</div>

  <div class="brand">@bisaek.kr · 지니 콘텐츠 스튜디오</div>

<script>
  var FILES = { ar:"kbridge_drama_reel_ar.mp4", ko:"kbridge_drama_reel_ko.mp4", en:"kbridge_drama_reel_en.mp4" };
  function pick(lang){
    var v=document.getElementById('player');
    document.getElementById('src').src=FILES[lang]; v.load();
    ['ar','ko','en'].forEach(function(l){ document.getElementById('btn-'+l).classList.toggle('active', l===lang); });
  }
</script>
</body>
</html>
