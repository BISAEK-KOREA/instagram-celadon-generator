name: Auto Post to Instagram

# 실행 시점: 월/수/금 09:00 KST (UTC 기준 00:00) — 필요하면 이 cron 줄만 바꾸면 빈도가 바뀝니다.
# 예: 매일 → '0 0 * * *'  /  일주일에 2번(월,목) → '0 0 * * 1,4'
on:
  schedule:
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "미리보기만 (인스타에 게시하지 않고 이미지만 아티팩트로 업로드)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 실행 환경의 아랍어 렌더링 경로를 로그로 남긴다(문제 추적용).
      - name: 렌더링 환경 점검
        run: python generate_post.py --check-env

      - name: 다음 순서 포스트 이미지 생성
        id: generate
        run: |
          IMAGE_PATH=$(python generate_post.py --next --batch posts.json --state state.json --output-dir docs | tail -n 1)
          echo "image_path=$IMAGE_PATH" >> "$GITHUB_OUTPUT"

      # ── 미리보기(dry_run) 모드: 인스타에 올리지 않고 이미지를 아티팩트로만 올린다 ──
      - name: (미리보기) 생성 이미지 업로드
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: preview-image
          path: ${{ steps.generate.outputs.image_path }}

      # ── 실제 게시 모드: 아래 단계들은 dry_run이 아닐 때만 실행 ──
      - name: 생성된 이미지를 GitHub Pages(docs/)에 반영
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state.json
          git commit -m "자동 생성: 다음 포스트 이미지" || echo "변경 사항 없음"
          git push

      - name: GitHub Pages 배포 대기
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: sleep 60

      - name: Instagram에 게시
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # GitHub Pages 소스가 /docs 폴더이므로, 실제 배포 URL에는 /docs가 붙지 않는다.
          PUBLIC_BASE_URL: https://bisaek-korea.github.io/instagram-celadon-generator
        run: python generate_post.py --publish "${{ steps.generate.outputs.image_path }}" --public-base-url "$PUBLIC_BASE_URL"
