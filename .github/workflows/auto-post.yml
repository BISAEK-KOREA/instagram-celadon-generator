name: Auto Post to Instagram

# 실행 시점: 월/수/금 09:00 KST (UTC 기준 00:00) — 필요하면 이 cron 줄만 바꾸면 빈도가 바뀝니다.
# 예: 매일 → '0 0 * * *'  /  일주일에 2번(월,목) → '0 0 * * 1,4'
on:
  schedule:
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 다음 순서 포스트 이미지 생성
        id: generate
        run: |
          IMAGE_PATH=$(python generate_post.py --next --batch posts.json --state state.json --output-dir docs | tail -n 1)
          echo "image_path=$IMAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: 생성된 이미지를 GitHub Pages(docs/)에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state.json
          git commit -m "자동 생성: 다음 포스트 이미지" || echo "변경 사항 없음"
          git push

      - name: GitHub Pages 배포 대기
        run: sleep 60

      - name: Instagram에 게시
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # 아래 URL의 <GITHUB-USERNAME>과 <REPO-NAME>을 실제 값으로 바꿔주세요.
          # 예: https://bisaek-korea.github.io/instagram-celadon-generator/docs
          PUBLIC_BASE_URL: https://<GITHUB-USERNAME>.github.io/<REPO-NAME>/docs
        run: python generate_post.py --publish "${{ steps.generate.outputs.image_path }}" --public-base-url "$PUBLIC_BASE_URL"
